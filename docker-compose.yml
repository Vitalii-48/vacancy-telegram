version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: vacancy_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: vacancy_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacancy_user -d vacancy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  scanner:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql://vacancy_user:your_password@postgres:5432/vacancy_db

volumes:
  pgdata:
